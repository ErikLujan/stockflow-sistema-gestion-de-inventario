<div class="h-screen w-full flex bg-main text-text-primary font-sans relative overflow-hidden">

    <div *ngIf="isSidebarOpen" (click)="closeSidebar()"
        class="fixed inset-0 bg-black/60 z-20 lg:hidden backdrop-blur-sm transition-opacity">
    </div>

    <aside
        class="fixed inset-y-0 left-0 z-30 w-64 bg-surface border-r border-border-subtle flex flex-col transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 shadow-2xl shadow-black/50"
        [ngClass]="{'translate-x-0': isSidebarOpen, '-translate-x-full': !isSidebarOpen}">

        <div class="h-16 flex items-center justify-between px-6 border-b border-border-subtle shrink-0">
            <div class="flex items-center gap-3 group">
                <div
                    class="h-10 w-10 rounded-full flex items-center justify-center shadow-lg shadow-accent/50 transition-all hover:shadow-xl hover:shadow-accent/80">
                    <img src="assets\icono.png" alt="StockFlow Logo" class="h-full w-full object-cover rounded-full">
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-text-primary to-accent text-gradient-nuclear">
                    StockFlow
                </span>
            </div>

            <button (click)="closeSidebar()"
                class="lg:hidden text-text-secondary hover:text-text-primary transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a routerLink="/dashboard"
                routerLinkActive="bg-accent/15 text-text-primary border-accent shadow-inner shadow-accent/10"
                (click)="closeSidebar()"
                class="flex items-center px-4 py-3 rounded-xl border-l-2 border-transparent text-text-secondary hover:bg-border-subtle hover:text-text-primary transition-all cursor-pointer group">
                <svg class="w-5 h-5 mr-3 transition-colors group-hover:text-accent" [routerLinkActive]="'text-accent'"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                <span class="font-medium">Dashboard</span>
            </a>

            <a routerLink="/productos"
                routerLinkActive="bg-accent/15 text-text-primary border-accent shadow-inner shadow-accent/10"
                (click)="closeSidebar()"
                class="flex items-center px-4 py-3 rounded-xl border-l-2 border-transparent text-text-secondary hover:bg-border-subtle hover:text-text-primary transition-all cursor-pointer group">
                <svg class="w-5 h-5 mr-3 transition-colors group-hover:text-accent" [routerLinkActive]="'text-accent'"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                </svg>
                <span class="font-medium">Productos</span>
            </a>

            <a routerLink="/categorias"
                routerLinkActive="bg-accent/15 text-text-primary border-accent shadow-inner shadow-accent/10"
                (click)="closeSidebar()"
                class="flex items-center px-4 py-3 rounded-xl border-l-2 border-transparent text-text-secondary hover:bg-border-subtle hover:text-text-primary transition-all cursor-pointer group">
                <svg class="w-5 h-5 mr-3 transition-colors group-hover:text-accent" [routerLinkActive]="'text-accent'"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z">
                    </path>
                </svg>
                <span class="font-medium">Categorías</span>
            </a>

            <a routerLink="/movimientos"
                routerLinkActive="bg-accent/15 text-text-primary border-accent shadow-inner shadow-accent/10"
                (click)="closeSidebar()"
                class="flex items-center px-4 py-3 rounded-xl border-l-2 border-transparent text-text-secondary hover:bg-border-subtle hover:text-text-primary transition-all cursor-pointer group">
                <svg class="w-5 h-5 mr-3 transition-colors group-hover:text-accent" [routerLinkActive]="'text-accent'"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                </svg>
                <span class="font-medium">Movimientos</span>
            </a>

            <a *ngIf="isAdmin()" routerLink="/usuarios"
                routerLinkActive="bg-accent/15 text-text-primary border-accent shadow-inner shadow-accent/10"
                (click)="closeSidebar()"
                class="flex items-center px-4 py-3 rounded-xl border-l-2 border-transparent text-text-secondary hover:bg-border-subtle hover:text-text-primary transition-all cursor-pointer group">
                <svg class="w-5 h-5 mr-3 transition-colors group-hover:text-accent" [routerLinkActive]="'text-accent'"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
                <span class="font-medium">Usuarios</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">

        <header
            class="h-16 border-b border-border-subtle bg-main/80 backdrop-blur-md flex items-center justify-between px-4 sm:px-8 shrink-0 shadow-sm z-10">
            <div class="flex items-center">
                <button (click)="toggleSidebar()"
                    class="mr-4 lg:hidden text-text-secondary hover:text-text-primary focus:outline-none transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h2 class="text-lg sm:text-xl font-semibold text-text-primary truncate drop-shadow-sm">Panel de
                    Administración
                </h2>
            </div>

            <div class="flex items-center space-x-4">

                <div class="relative">
                    <div *ngIf="isProfileMenuOpen()" (click)="closeProfileMenu()" class="fixed inset-0 z-40"></div>

                    <button (click)="toggleProfileMenu()"
                        class="relative z-50 h-9 w-9 sm:h-10 sm:w-10 rounded-full bg-surface border-2 border-accent flex items-center justify-center text-accent shadow-lg shadow-accent/40 hover:shadow-accent/70 hover:bg-accent/10 transition-all focus:outline-none cursor-pointer">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </button>

                    <div *ngIf="isProfileMenuOpen()"
                        class="absolute right-0 mt-3 w-56 bg-surface border border-border-subtle rounded-xl shadow-2xl py-2 z-50 animate-in fade-in slide-in-from-top-2 duration-200">

                        <div class="px-4 py-3 border-b border-border-subtle mb-1">
                            <p class="text-sm font-bold text-text-primary truncate">{{ userEmail() }}</p>
                            <p class="text-xs mt-0.5 uppercase tracking-wider font-bold"
                                [ngClass]="isAdmin() ? 'text-accent' : 'text-text-secondary'">
                                {{ isAdmin() ? 'Administrador' : 'Usuario' }}
                            </p>
                        </div>

                        <button (click)="logout()"
                            class="w-full text-left px-4 py-2.5 text-sm text-critical hover:bg-critical/10 transition-colors flex items-center group">
                            <svg class="w-4 h-4 mr-2.5 group-hover:-translate-x-1 transition-transform" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                </path>
                            </svg>
                            <span class="font-medium">Cerrar Sesión</span>
                        </button>
                    </div>
                </div>

            </div>
        </header>

        <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 sm:p-8">
            <div class="h-full">
                <router-outlet></router-outlet>
            </div>
        </div>
    </main>
</div>
