<div
    class="min-h-screen flex items-center justify-center py-8 px-4 sm:py-12 sm:px-6 lg:px-8 bg-main relative overflow-hidden animate-fade-in-up">
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] bg-accent/15 rounded-full blur-[100px] sm:blur-[120px] pointer-events-none">
    </div>

    <div
        class="relative max-w-md w-full space-y-8 bg-surface/90 backdrop-blur-xl p-8 sm:p-10 rounded-3xl border border-border-subtle shadow-2xl z-10">

        <div class="text-center">
            <div
                class="mx-auto h-16 w-16 rounded-full flex items-center justify-center bg-main border border-border-subtle shadow-[0_0_20px_-2px_rgba(var(--accent-rgb),0.3)] mb-6">
                <img src="assets/icono.png" alt="Logo de StockFlow" class="h-10 w-10 object-contain">
            </div>

            <h2
                class="text-2xl sm:text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-br from-text-primary to-text-secondary">
                Gestión de Inventario
            </h2>

            <p class="mt-3 text-sm text-text-secondary">
                Ingresa tus credenciales para acceder al panel
            </p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <div *ngIf="errorMessage()"
                class="bg-critical/10 border border-critical/20 text-critical p-4 rounded-xl text-sm flex items-center shadow-inner"
                role="alert">
                <svg class="w-5 h-5 mr-2.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                        clip-rule="evenodd" />
                </svg>
                <span class="font-medium">{{ errorMessage() }}</span>
            </div>

            <div class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-text-secondary mb-1.5 ml-1">Correo
                        Electrónico</label>

                    <input id="email" type="email" autocomplete="email" formControlName="email"
                        class="w-full px-4 py-3.5 bg-main/50 border rounded-xl text-text-primary placeholder-text-secondary/50 focus:outline-none focus:ring-2 focus:border-transparent transition-all"
                        [ngClass]="{'border-critical focus:ring-critical/30': f['email'].invalid && f['email'].touched, 'border-border-subtle focus:ring-accent/40 focus:border-accent': !(f['email'].invalid && f['email'].touched)}"
                        placeholder="admin@inventario.com">

                    <div *ngIf="f['email'].invalid && f['email'].touched"
                        class="text-xs text-critical mt-1.5 ml-1 flex flex-col font-medium">
                        <span *ngIf="f['email'].errors?.['required']">El correo es obligatorio.</span>
                        <span *ngIf="f['email'].errors?.['email']">Debe ser un correo válido.</span>
                    </div>
                </div>

                <div>
                    <label for="password"
                        class="block text-sm font-medium text-text-secondary mb-1.5 ml-1">Contraseña</label>

                    <div class="relative">
                        <input id="password" [type]="showPassword() ? 'text' : 'password'"
                            autocomplete="current-password" formControlName="password"
                            class="w-full px-4 py-3.5 bg-main/50 border rounded-xl text-text-primary placeholder-text-secondary/50 focus:outline-none focus:ring-2 focus:border-transparent transition-all pr-12"
                            [ngClass]="{'border-critical focus:ring-critical/30': f['password'].invalid && f['password'].touched, 'border-border-subtle focus:ring-accent/40 focus:border-accent': !(f['password'].invalid && f['password'].touched)}"
                            placeholder="••••••••">

                        <button type="button" (click)="togglePassword()" tabindex="-1"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-text-secondary hover:text-text-primary focus:outline-none transition-colors">

                            <svg *ngIf="!showPassword()" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>

                            <svg *ngIf="showPassword()" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>

                    <div *ngIf="f['password'].invalid && f['password'].touched"
                        class="text-xs text-critical mt-1.5 ml-1 flex flex-col font-medium">
                        <span *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria.</span>
                        <span *ngIf="f['password'].errors?.['minlength']">Mínimo 6 caracteres.</span>
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" [disabled]="loginForm.invalid || isLoading()"
                    class="w-full flex justify-center py-3.5 px-4 rounded-xl text-white bg-accent hover:bg-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-accent transition-all disabled:opacity-50 disabled:cursor-not-allowed font-semibold shadow-lg shadow-accent/25 hover:shadow-accent/40 active:scale-[0.98]">
                    <svg *ngIf="isLoading()" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    {{ isLoading() ? 'Autenticando...' : 'Iniciar Sesión' }}
                </button>
            </div>
        </form>
    </div>
</div>
